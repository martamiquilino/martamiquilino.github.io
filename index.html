<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marta Miquilino</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#faf8f5;
color:#333;
}

header{
background:#ffffff;
padding:25px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

header h1{
font-size:30px;
color:#b8860b;
}

header p{
margin-top:8px;
color:#777;
}

.banner{
margin:20px;
padding:30px;
border-radius:20px;
background:linear-gradient(135deg,#f9e7ef,#fff8f0);
text-align:center;
}

.banner h2{
font-size:28px;
margin-bottom:10px;
}

.banner p{
color:#666;
}

.botao{
display:inline-block;
margin-top:20px;
padding:14px 28px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:50px;
font-weight:bold;
}

.categorias{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 3px 12px rgba(0,0,0,.08);
font-weight:bold;
}
.topo{
background:white;
padding:30px 20px;
text-align:center;
position:sticky;
top:0;
z-index:999;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.topo h1{
font-size:34px;
color:#b78b13;
margin-bottom:8px;
}

.topo p{
color:#666;
margin-bottom:18px;
}

.pesquisa{
width:100%;
max-width:450px;
padding:15px;
border:none;
border-radius:40px;
background:#f4f4f4;
font-size:16px;
outline:none;
}

</head>

<body>

<header class="topo">

<h1>🌸 Marta Miquilino</h1>

<p>
Perfumes • Cosméticos • Autocuidado
</p>

<input
type="search"
placeholder="🔍 Pesquisar produtos..."
class="pesquisa">

</header>

<section class="banner">
<h2>Natura • Avon • O Boticário • Eudora</h2>
<p>Escolha seu produto e faça seu pedido pelo WhatsApp.</p>

<a class="botao" href="https://wa.me/55SEUNUMERO">
Pedir pelo WhatsApp
</a>

</section>

<section class="categorias">

<div class="card">🌸 Natura</div>

<div class="card">💄 Avon</div>

<div class="card">✨ O Boticário</div>

<div class="card">💜 Eudora</div>

<div class="card">🎁 Kits</div>

<div class="card">🏷 Promoções</div>

</section>

</body>
</html>
