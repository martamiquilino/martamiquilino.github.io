<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marta Miquilino | Catálogo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8f6f2;
color:#333;
}

header{
background:linear-gradient(135deg,#fff,#f6e6b6);
padding:35px 20px;
text-align:center;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

header h1{
font-size:34px;
color:#b8860b;
margin-bottom:10px;
}

header p{
color:#666;
font-size:16px;
}

.pesquisa{
margin-top:20px;
width:100%;
max-width:500px;
padding:15px;
border:none;
border-radius:30px;
font-size:16px;
box-shadow:0 2px 8px rgba(0,0,0,.12);
outline:none;
}

.banner{

margin:25px;

padding:25px;

border-radius:20px;

background:linear-gradient(135deg,#ffe28d,#fff8df);

text-align:center;

}

.banner h2{

margin-bottom:12px;

color:#6b5200;

}

.botao{

display:inline-block;

margin-top:18px;

background:#25D366;

color:white;

padding:14px 28px;

border-radius:30px;

text-decoration:none;

font-weight:bold;

}

main{

padding:20px;

}

h3{

margin-bottom:15px;

}

.categorias{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

}

.card{

background:white;

padding:20px;

border-radius:15px;

text-align:center;

box-shadow:0 3px 10px rgba(0,0,0,.08);

font-weight:bold;

}

</style>

</head>

<body>

<header>

<h1>Marta Miquilino</h1>

<p>Perfumes • Cosméticos • Autocuidado</p>

<input
class="pesquisa"
placeholder="Pesquisar produtos...">

</header>

<main>
<section class="banner">

<h2>Seja bem-vinda ao meu catálogo!</h2>

<p>
Encontre perfumes, cosméticos e produtos de autocuidado das melhores marcas.
</p>

<a class="botao"
href="https://wa.me/5544998606462?text=Olá!%20Vim%20pelo%20catálogo%20e%20gostaria%20de%20mais%20informações.">
Falar no WhatsApp
</a>

</section>

<h3>Categorias</h3>

<section class="categorias">

<div class="card">🌸 Natura</div>

<div class="card">💄 Avon</div>

<div class="card">✨ O Boticário</div>

<div class="card">💜 Eudora</div>

<div class="card">🎁 Kits</div>

<div class="card">🏷️ Promoções</div>

</section>
<h3>Lançamentos</h3>

<div class="card">
...
</div>

</main>

</body>

</html>
